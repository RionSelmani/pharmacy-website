<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arra Pharmacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h2 class="logo">Arra<span>Pharmacy</span></h2>
            <div class="search-box">
                <input type="text" id="search" placeholder="Kërko produkte, vitamina...">

            </div>
            <div class="cart-icon" onclick="openCart()">
            🛒 <span id="cart-count">0</span>
        </div>
            
        </div>


    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Kategoritë</h3>
            <ul>
                <li onclick="filterCategory('all')" class="active">Të gjitha</li>
                <li onclick="filterCategory('Vitamina')" class="active">Vitamina</li>
                <li onclick="filterCategory('Nëna & Foshnja')" class="active">Nëna & Foshnja</li>
            </ul>
        </aside>
        <main class="products-section">
            <div class="products-grid" id="products-container">
            </div>

        </main>

    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-header">
            <h3>Shporta Juaj</h3>
            <span class="close" onclick="closeCart()">&times;</span>
            <div>
                <div id="cart-items"></div>
                <div class="modal-footer">
                    <h4 id="total">Totali: 0€</h4>
                    <button class="btn-checkout">Vazhdo te Pagesa</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
