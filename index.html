<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arra Pharmacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h2 class="logo">Arra<span>Pharmacy</span></h2>
            <div class="search-box">
                <input type="text" id="search" placeholder="Kërko produkte, vitamina...">
            </div>
            <div class="cart-icon" onclick="openCart()" style="cursor: pointer; font-size: 24px; position: relative;">
                🛒 <span id="cart-count" style="background: var(--primary-color); color: white; border-radius: 50%; padding: 2px 8px; font-size: 14px; position: absolute; top: -10px; right: -10px;">0</span>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Kategoritë</h3>
            <ul>
                <li onclick="filterCategory('all')">Të gjitha</li>
                <li onclick="filterCategory('Vitamina')">Vitamina</li>
                <li onclick="filterCategory('Nëna & Foshnja')">Nëna & Foshnja</li>
            </ul>
        </aside>

        <main class="products-section" style="flex-grow: 1;">
            <div class="products-grid" id="products-container">
                </div>
        </main>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h3 style="margin: 0;">Shporta Juaj</h3>
                <span class="close" onclick="closeCart()" style="cursor:pointer; font-size: 28px;">&times;</span>
            </div>
            
            <div id="cart-items"></div>

            <div id="total"></div>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
